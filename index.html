<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Stats</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a21;
      --border: #262b34;
      --text: #e7e9ec;
      --muted: #8a909b;
      --accent: #5eead4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 48px 20px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
    }
    main {
      width: 100%;
      max-width: 640px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 0 0 4px;
    }
    p.subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 0 0 28px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 10px 14px;
      text-align: left;
      font-size: 0.92rem;
    }
    th {
      color: var(--muted);
      font-weight: 500;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
    }
    td {
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
    }
    tr:last-child td { border-bottom: none; }
    td.num, th.num { text-align: right; }
    td.rank {
      color: var(--muted);
      width: 32px;
    }
    td.name {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    td.name .head {
      border-radius: 4px;
      display: block;
      background: var(--border);
      flex-shrink: 0;
    }
    #status, #empty {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 20px 0;
    }
    footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
    }
    #feed-status {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 20px 0;
    }
    #feed li {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    #feed li .desc { color: var(--text); }
    #feed li .desc b { color: var(--accent); font-weight: 600; }
    #feed li .time {
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<main>
  <h1>Player Stats</h1>
  <p class="subtitle">Kills, deaths, and zombies slain: updated live from the server.</p>
  <div id="status">Loading stats…</div>
  <table id="table" style="display:none;">
    <thead>
    <tr>
      <th>#</th>
      <th>Player</th>
      <th class="num">Kills</th>
      <th class="num">Deaths</th>
      <th class="num">Zombies</th>
    </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <h1 style="margin-top:40px;">Recent Activity</h1>
  <p class="subtitle">Live kill/death feed.</p>
  <div id="feed-status">Loading activity...</div>
  <ul id="feed" style="list-style:none; margin:0; padding:0; display:none;"></ul>

  <footer>Refreshes every 5 seconds</footer>
</main>
<script>
  async function loadStats() {
    const status = document.getElementById('status');
    const table = document.getElementById('table');
    const rowsEl = document.getElementById('rows');
    try {
      const res = await fetch('/api/stats');
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      const players = data.players || [];
      if (players.length === 0) {
        status.textContent = 'No stats recorded yet.';
        return;
      }
      rowsEl.innerHTML = players.map((p, i) => `
        <tr>
          <td class="rank">${i + 1}</td>
          <td class="name">
            <img
              class="head"
              src="https://mc-heads.net/avatar/${encodeURIComponent(p.username)}/24"
              alt=""
              width="24"
              height="24"
              loading="lazy"
              onerror="this.style.visibility='hidden'"
            >
            <span>${escapeHtml(p.username)}</span>
          </td>
          <td class="num">${p.kills}</td>
          <td class="num">${p.deaths}</td>
          <td class="num">${p.zombies_killed}</td>
        </tr>
      `).join('');
      status.style.display = 'none';
      table.style.display = 'table';
    } catch (err) {
      status.textContent = 'Could not load stats right now.';
    }
  }

  function describeEvent(e) {
    const name = `<b>${escapeHtml(e.username)}</b>`;
    switch (e.event_type) {
      case 'KILL':
        return `${name} killed <b>${escapeHtml(e.target_name)}</b>`;
      case 'DEATH':
        if (e.target_name) {
          return `${name} was killed by <b>${escapeHtml(e.target_name)}</b>`;
        }
        return `${name} died: ${escapeHtml(e.detail || 'Unknown causes')}`;
      case 'ZOMBIE_KILL':
        return `${name} killed a zombie`;
      default:
        return `${name} — ${escapeHtml(e.event_type)}`;
    }
  }

  function timeAgo(isoString) {
    const seconds = Math.floor((Date.now() - new Date(isoString).getTime()) / 1000);
    if (seconds < 60) return `${seconds}s ago`;
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    return `${Math.floor(hours / 24)}d ago`;
  }

  async function loadHistory() {
    const status = document.getElementById('feed-status');
    const feed = document.getElementById('feed');
    try {
      const res = await fetch('/api/history?limit=50');
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      const events = data.events || [];
      if (events.length === 0) {
        status.textContent = 'No activity yet.';
        return;
      }
      feed.innerHTML = events.map(e => `
        <li>
          <span class="desc">${describeEvent(e)}</span>
          <span class="time">${timeAgo(e.created_at)}</span>
        </li>
      `).join('');
      status.style.display = 'none';
      feed.style.display = 'block';
    } catch (err) {
      status.textContent = 'Could not load activity right now.';
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  loadStats();
  setInterval(loadStats, 5000);
  loadHistory();
  setInterval(loadHistory, 5000);
</script>
</body>
</html>
